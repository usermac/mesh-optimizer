name: Release MCP Connector

on:
  push:
    tags:
      - 'mcp-v*'  # Trigger on tags like mcp-v0.1.0
  workflow_dispatch:  # Allow manual trigger

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS-ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: meshopt-mcp-server
            asset_name: meshopt-mcp-server-macos-arm64

          - name: macOS-Intel
            os: macos-latest
            target: x86_64-apple-darwin
            binary: meshopt-mcp-server
            asset_name: meshopt-mcp-server-macos-x64

          - name: Linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: meshopt-mcp-server
            asset_name: meshopt-mcp-server-linux-x64

          - name: Windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: meshopt-mcp-server.exe
            asset_name: meshopt-mcp-server-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --package meshopt-mcp-server --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/meshopt-mcp-server-macos-arm64/meshopt-mcp-server-macos-arm64
            artifacts/meshopt-mcp-server-macos-x64/meshopt-mcp-server-macos-x64
            artifacts/meshopt-mcp-server-linux-x64/meshopt-mcp-server-linux-x64
            artifacts/meshopt-mcp-server-windows-x64.exe/meshopt-mcp-server-windows-x64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
